name: Daily KOSDAQ Data Update

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Node.js 24 사용을 위한 환경 변수 추가
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v5 # v4에서 v5(또는 최신)로 변경

    - name: Set up Python
      uses: actions/setup-python@v6 # v5에서 v6(또는 최신)으로 변경
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pykrx pandas

    - name: Run script
      run: python main.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Update KOSDAQ data - $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
