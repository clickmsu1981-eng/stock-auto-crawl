name: Daily Market Data Update

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

# ✨ 중요: 봇이 엑셀 파일을 레포지토리에 푸시할 수 있도록 쓰기 권한 부여
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      # ✨ 중요: pandas로 엑셀을 다루기 위한 openpyxl과 HTML 파싱을 위한 lxml 추가
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas openpyxl lxml

    - name: Run script
      run: python main.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add *.xlsx
        git commit -m "Update Market data - $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
